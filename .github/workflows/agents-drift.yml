name: agents-drift

# Fails the PR if the synced @commerce-atoms/agents content (AGENTS.md,
# CLAUDE.md, copilot-instructions.md, .cursor/rules/, .claude/, .github/skills/,
# .github/commerce-atoms/, agents.config.json) is out of date relative to the
# pinned version in agents.config.json.
#
# To fix locally:  npx commerce-atoms-agents sync
#
# Why this exists: re-syncing is currently a manual step. Without this gate,
# every storefront fork can drift indefinitely from the pinned kit version,
# and architecture rules / overlays will silently fall out of date.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Read pinned agents version
        id: pin
        run: |
          if [ ! -f agents.config.json ]; then
            echo "::warning::agents.config.json missing — skipping drift check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          version=$(node -p "JSON.parse(require('fs').readFileSync('agents.config.json','utf8')).agentsVersion || ''")
          if [ -z "$version" ]; then
            echo "::warning::No agentsVersion pinned in agents.config.json — skipping drift check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      # `--strict` causes sync to exit 1 when any synced file has been edited
      # locally (divergent). The follow-up git checks catch the other drift
      # cases: tracked files changed (stale pin) and new sidecars/files
      # generated by sync that weren't committed.
      - name: Run sync against pinned version (strict)
        if: steps.pin.outputs.skip != 'true'
        run: npx -y "@commerce-atoms/agents@${{ steps.pin.outputs.version }}" sync --strict

      - name: Fail on tracked-file drift
        if: steps.pin.outputs.skip != 'true'
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "::error::Drift detected against @commerce-atoms/agents@${{ steps.pin.outputs.version }}."
            echo "::error::Run locally:  npx commerce-atoms-agents sync"
            echo "::error::Then commit the resulting changes."
            exit 1
          fi

      - name: Fail on untracked sync output
        if: steps.pin.outputs.skip != 'true'
        run: |
          untracked=$(git ls-files --others --exclude-standard)
          if [ -n "$untracked" ]; then
            echo ""
            echo "::error::Sync produced untracked files (likely *.kit-incoming.* sidecars or new kit content):"
            echo "$untracked"
            echo "::error::Run locally:  npx commerce-atoms-agents sync"
            echo "::error::Resolve sidecars (merge or accept canonical), then commit."
            exit 1
          fi
          echo "No drift. Synced kit matches @commerce-atoms/agents@${{ steps.pin.outputs.version }}."
